<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة التحكم - Islam Saeid Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A05C;
            --dark: #1A1A10;
            --surface: #252518;
            --text: #ffffff;
            --text-muted: #aaaaaa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: var(--dark); color: var(--text); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--gold); padding-bottom: 20px; }
        h1 { color: var(--gold); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .card { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid rgba(201,160,92,0.2); }
        h2 { color: var(--gold); margin-bottom: 15px; font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--text-muted); }
        input, select, textarea { width: 100%; padding: 10px; background: var(--dark); border: 1px solid rgba(201,160,92,0.4); border-radius: 6px; color: #fff; }
        button { background: var(--gold); color: var(--dark); border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        .booking-item { background: var(--dark); padding: 15px; border-radius: 8px; margin-bottom: 10px; border-right: 4px solid var(--gold); }
        .booking-item p { margin-bottom: 5px; font-size: 0.9rem; }
        .badge { background: rgba(201,160,92,0.2); color: var(--gold); padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>لوحة التحكم والإعدادات</h1>
            <p>إدارة الحجوزات وتعديل أسعار الباقات مباشرة</p>
        </header>

        <div class="grid">
            <div class="card">
                <h2>تعديل أسعار وتفاصيل الباقات</h2>
                <form id="packageForm">
                    <div class="form-group">
                        <label>اختر نوع التصوير</label>
                        <select id="pkgCategory">
                            <option value="wedding">زفاف (Wedding)</option>
                            <option value="engagement">خطوبة (Engagement)</option>
                            <option value="hall">قاعة فقط (Hall Only)</option>
                            <option value="book">كتب كتاب (Katb Ktab)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>رقم الباقة</label>
                        <select id="pkgId">
                            <option value="1">باقة 1</option>
                            <option value="2">باقة 2</option>
                            <option value="3">باقة 3</option>
                            <option value="4">باقة 4</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>السعر الجديد (جنيه)</label>
                        <input type="number" id="pkgPrice" required placeholder="مثال: 5000">
                    </div>
                    <div class="form-group">
                        <label>تفاصيل ومميزات الباقة</label>
                        <textarea id="pkgDetails" rows="4" required placeholder="اكتب كل ميزة في سطر منفصل..."></textarea>
                    </div>
                    <button type="submit">تحديث وتعديل الباقة الآن</button>
                </form>
            </div>

            <div class="card">
                <h2>الحجوزات الأخيرة المأكدة أونلاين</h2>
                <div id="bookingsList">
                    <p style="color:var(--text-muted);">جاري تحميل الحجوزات وسماع أي طلبات جديدة لحظياً...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // سيتم ربط الـ Config تلقائياً بمشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyA...", 
            authDomain: "isp-bookings.firebaseapp.com",
            projectId: "isp-bookings",
            storageBucket: "isp-bookings.appspot.com",
            messagingSenderId: "59...",
            appId: "1:59..."
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // تشغيل صوت تنبيه عند وصول حجز جديد والصفحة مفتوحة
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playNotificationSound() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.3);
        }

        let isFirstLoad = true;
        db.collection("bookings").orderBy("createdAt", "desc")
            .onSnapshot((snapshot) => {
                const bookingsList = document.getElementById("bookingsList");
                bookingsList.innerHTML = "";
                
                if (snapshot.empty) {
                    bookingsList.innerHTML = "<p>لا توجد حجوزات مسجلة حتى الآن.</p>";
                    return;
                }

                if (!isFirstLoad && snapshot.docChanges().some(change => change.type === "added")) {
                    playNotificationSound();
                    alert("🔔 رائع! تم استقبال حجز عريس جديد الآن!");
                }
                isFirstLoad = false;

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const item = document.createElement("div");
                    item.className = "booking-item";
                    item.innerHTML = `
                        <p><strong>العريس/العروسة:</strong> ${data.groom || ''} & ${data.bride || ''}</p>
                        <p><strong>الموبايل:</strong> ${data.phone1 || ''}</p>
                        <p><strong>التاريخ:</strong> ${data.date || ''} | <strong>النوع:</strong> <span class="badge">${data.type || ''}</span></p>
                        <p><strong>الباقة:</strong> ${data.packageName || ''} - <strong>السعر:</strong> ${data.price || 0} ج</p>
                        <p><strong>المدفوع:</strong> ${data.deposit || 0} ج | <strong>المتبقي:</strong> <span style="color:var(--gold)">${data.remaining || 0} ج</span></p>
                    `;
                    bookingsList.appendChild(item);
                });
            });

        // حفظ وتعديل الباقات في Firebase
        document.getElementById("packageForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const category = document.getElementById("pkgCategory").value;
            const id = document.getElementById("pkgId").value;
            const price = parseFloat(document.getElementById("pkgPrice").value);
            const details = document.getElementById("pkgDetails").value.split('\n').filter(line => line.trim() !== "");

            try {
                await db.collection("packages").doc(`${category}_pkg_${id}`).set({
                    category: category,
                    packageId: id,
                    price: price,
                    details: details,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("✅ ممتاز! تم تحديث الباقة بنجاح وستظهر فوراً لجميع العملاء عند الحجز أونلاين!");
                document.getElementById("pkgPrice").value = "";
                document.getElementById("pkgDetails").value = "";
            } catch (error) {
                console.error(error);
                alert("حدث خطأ أثناء حفظ الباقة، حاول مرة أخرى.");
            }
        });
    </script>
</body>
</html>
