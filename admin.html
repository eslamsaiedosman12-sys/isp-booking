<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ISP Admin">
<meta name="theme-color" content="#0d0d0d">
<title>Admin — Islam Saeid Photography</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold2:#E8C97A;--dark:#0d0d0d;--dark2:#1a1010;--surface:#fff;--surface2:#faf8f5;--border:rgba(0,0,0,0.08);--text:#1a0a0f;--text2:#6b5060;--text3:#aaa;--green:#2d7a3a;--green-l:#e8f5eb;--amber:#8a5200;--amber-l:#fff3e0;--blue:#1a5fa5;--blue-l:#e8f1fb;--radius:18px;--radius-sm:12px;--shadow:0 4px 24px rgba(0,0,0,0.08)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Cairo',sans-serif;background:var(--surface2);color:var(--text);min-height:100dvh}
.login-screen{position:fixed;inset:0;background:linear-gradient(160deg,#0d0d0d,#1a0808,#2a1015);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;z-index:100}
.login-screen.hide{display:none}
.login-logo{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:20px;box-shadow:0 8px 32px rgba(201,168,76,0.3)}
.login-title{font-size:20px;font-weight:800;color:#fff;margin-bottom:6px}
.login-sub{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:32px}
.login-input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(201,168,76,0.3);border-radius:var(--radius-sm);padding:14px;font-family:'Cairo',sans-serif;font-size:18px;color:#fff;text-align:center;letter-spacing:0.2em;outline:none;margin-bottom:14px}
.login-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--dark);border:none;border-radius:var(--radius-sm);padding:14px;font-family:'Cairo',sans-serif;font-size:16px;font-weight:800;cursor:pointer}
.login-err{color:#ff6b6b;font-size:13px;margin-top:8px;display:none}
.header{background:linear-gradient(135deg,var(--dark),var(--dark2));padding:52px 20px 20px;position:relative}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(201,168,76,0.08),transparent 60%)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;position:relative}
.hdr-title{font-size:16px;font-weight:800;color:#fff}
.hdr-title span{color:var(--gold2)}
.hdr-logout{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);border-radius:99px;padding:6px 14px;font-family:'Cairo',sans-serif;font-size:12px;cursor:pointer}
.stats{padding:0 16px;margin-top:-10px;display:grid;grid-template-columns:1fr 1fr;gap:10px;position:relative;z-index:5}
.stat{background:var(--surface);border-radius:var(--radius-sm);padding:14px;box-shadow:var(--shadow);border:1px solid var(--border)}
.stat.dark{background:linear-gradient(135deg,var(--dark),var(--dark2));border-color:rgba(201,168,76,0.2)}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:3px}
.stat.dark .stat-label{color:rgba(255,255,255,0.4)}
.stat-val{font-size:19px;font-weight:800}
.stat-val.g{color:var(--green)}
.stat-val.a{color:var(--amber)}
.stat-val.gold{color:var(--gold2)}
/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;margin-top:14px}
.tab-btn{flex:1;padding:12px 6px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;color:var(--text2);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;transition:all 0.2s}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-pane{display:none}
.tab-pane.active{display:block}
/* SECTIONS */
.section-hdr{display:flex;align-items:center;gap:8px;padding:14px 16px 6px}
.section-hdr-title{font-size:13px;font-weight:700;color:var(--text2)}
.section-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--amber-l);color:var(--amber)}
.section-badge.done{background:var(--blue-l);color:var(--blue)}
.filter-wrap{padding:8px 16px 0;display:flex;gap:8px}
.filter-wrap input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-family:'Cairo',sans-serif;font-size:13px;color:var(--text);outline:none}
.filter-wrap input:focus{border-color:var(--gold)}
.list-wrap{padding:10px 16px 80px}
.list-hdr{font-size:12px;color:var(--text3);margin-bottom:8px}
.bcard{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;margin-bottom:12px;cursor:pointer;transition:transform 0.12s}
.bcard:active{transform:scale(0.982)}
.bacc{height:4px}
.bacc.confirmed{background:linear-gradient(90deg,var(--green),#4caf50)}
.bacc.pending{background:linear-gradient(90deg,#e9a800,#f5c842)}
.bacc.done{background:linear-gradient(90deg,var(--blue),#42a5f5)}
.bacc.archived{background:linear-gradient(90deg,#999,#bbb)}
.bbody{padding:14px 16px}
.btop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.bnames{font-size:15px;font-weight:700}
.bnames .amp{color:#D4537E;margin:0 3px}
.sbadge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.b-confirmed{background:var(--green-l);color:var(--green)}
.b-pending{background:var(--amber-l);color:var(--amber)}
.b-done{background:var(--blue-l);color:var(--blue)}
.b-archived{background:#f0f0f0;color:#888}
.bmeta{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;margin-bottom:10px}
.bm{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bpay{border-top:1px solid var(--border);padding-top:10px}
.bpay-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px}
.paid{color:var(--green);font-weight:700}
.rem{color:var(--amber);font-weight:700}
.progress{height:4px;background:#f0ede8;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#5cb85c);border-radius:99px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal-sheet{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-height:92dvh;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1);padding-bottom:env(safe-area-inset-bottom,20px)}
.modal-bg.open .modal-sheet{transform:translateY(0)}
.mhandle{width:40px;height:4px;background:#ddd;border-radius:99px;margin:12px auto 0}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--border)}
.mhead-title{font-size:16px;font-weight:700}
.mclose{background:#f5f0eb;border:none;border-radius:50%;width:32px;height:32px;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.dhero{padding:18px 20px 14px;background:linear-gradient(135deg,var(--dark),var(--dark2))}
.dcouple{font-size:20px;font-weight:800;color:#fff;margin-bottom:6px}
.dcouple .amp{color:var(--gold2)}
.dsec{padding:14px 20px;border-bottom:1px solid var(--border)}
.dsec-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.di-label{font-size:11px;color:var(--text2);margin-bottom:2px}
.di-val{font-size:13px;font-weight:600;color:var(--text)}
.di-val.g{color:var(--green)}
.di-val.a{color:var(--amber)}
.dactions{padding:14px 20px;display:flex;gap:8px;flex-wrap:wrap}
.btn-action{flex:1;background:#f5f0eb;color:var(--text);border:none;border-radius:var(--radius-sm);padding:12px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.btn-del{background:#fceaea;color:#a32020;border:none;border-radius:var(--radius-sm);padding:12px 14px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.btn-call{background:var(--green-l);color:var(--green);border:none;border-radius:var(--radius-sm);padding:12px 14px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center}
.status-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-family:'Cairo',sans-serif;font-size:13px;color:var(--text);outline:none}
/* REMAINING EDITOR */
.rem-editor{display:flex;gap:8px;align-items:center;margin-top:10px}
.rem-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;color:var(--amber);outline:none;text-align:center}
.rem-input:focus{border-color:var(--amber)}
.btn-save-rem{background:var(--dark);color:var(--gold2);border:none;border-radius:var(--radius-sm);padding:10px 16px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
/* ARCHIVED SECTION */
.arch-divider{padding:10px 16px 4px;font-size:12px;font-weight:700;color:var(--text3);display:flex;align-items:center;gap:8px}
.arch-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.bcard.is-archived{opacity:0.65}
/* PACKAGES */
.pkg-mgr{padding:14px 16px 80px}
.pkg-type-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;scrollbar-width:none}
.pkg-type-tabs::-webkit-scrollbar{display:none}
.ptt-btn{flex-shrink:0;padding:7px 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--surface);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;transition:all 0.2s}
.ptt-btn.active{background:var(--dark);color:var(--gold2);border-color:var(--dark)}
.pkg-item{background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.pkg-item-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer}
.pkg-item-name{font-size:14px;font-weight:700}
.pkg-item-price{font-size:13px;font-weight:800;color:var(--gold)}
.pkg-item-body{border-top:1px solid var(--border);padding:14px;display:none;flex-direction:column;gap:10px}
.pkg-item-body.open{display:flex}
.pi-label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px}
.pi-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-family:'Cairo',sans-serif;font-size:13px;color:var(--text);outline:none}
.pi-input:focus{border-color:var(--gold)}
.pi-textarea{min-height:70px;resize:vertical;line-height:1.6}
.pkg-actions{display:flex;gap:8px;margin-top:4px}
.btn-save-pkg{flex:1;background:var(--dark);color:var(--gold2);border:none;border-radius:var(--radius-sm);padding:10px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.btn-del-pkg{background:#fceaea;color:#a32020;border:none;border-radius:var(--radius-sm);padding:10px 14px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.btn-add-pkg{width:100%;background:var(--surface);border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:12px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;margin-top:4px;transition:all 0.2s}
.btn-add-pkg:hover{border-color:var(--gold);color:var(--gold)}
.sync-banner{background:linear-gradient(135deg,#e8f5eb,#f0faf2);border:1px solid #a8d5b0;border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--green);display:flex;align-items:center;gap:8px;margin-bottom:14px}
.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty div{font-size:40px;margin-bottom:12px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--dark);color:#fff;padding:11px 24px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:all 0.25s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;align-items:center;justify-content:center}
.loading.show{display:flex}
.spinner{width:44px;height:44px;border:4px solid rgba(201,168,76,0.3);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.today-tag{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:#fff3e0;color:#e65100;border:1px solid #ffcc80;margin-left:6px}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-logo">🔐</div>
  <div class="login-title">Islam Saeid Photography</div>
  <div class="login-sub">لوحة تحكم المسؤول</div>
  <input type="password" class="login-input" id="pwInput" placeholder="••••••" onkeydown="if(event.key==='Enter')checkLogin()">
  <button class="login-btn" onclick="checkLogin()">دخول</button>
  <div class="login-err" id="loginErr">كلمة المرور غير صحيحة</div>
</div>

<div class="header">
  <div class="hdr-top">
    <div class="hdr-title">Islam <span>Saeid</span> — Admin</div>
    <button class="hdr-logout" onclick="logout()">خروج</button>
  </div>
</div>

<div class="stats" id="statsGrid"></div>

<div class="tabs">
  <button class="tab-btn active" id="tabBtnBookings" onclick="switchTab('bookings')">📅 الحجوزات</button>
  <button class="tab-btn" id="tabBtnArchive" onclick="switchTab('archive')">🗂 الأرشيف</button>
  <button class="tab-btn" id="tabBtnPackages" onclick="switchTab('packages')">📦 الباقات</button>
</div>

<!-- TAB: BOOKINGS -->
<div class="tab-pane active" id="tab-bookings">
  <div class="filter-wrap">
    <input type="text" id="searchQ" placeholder="🔍 ابحث بالاسم..." oninput="filterList()">
  </div>
  <div class="list-wrap">
    <div class="list-hdr" id="listHdr"></div>
    <div id="bookingsList"></div>
  </div>
</div>

<!-- TAB: ARCHIVE -->
<div class="tab-pane" id="tab-archive">
  <div class="list-wrap">
    <div class="list-hdr" id="archiveHdr"></div>
    <div id="archiveList"></div>
  </div>
</div>

<!-- TAB: PACKAGES -->
<div class="tab-pane" id="tab-packages">
  <div class="pkg-mgr">
    <div class="sync-banner">✅ أي تعديل على الباقات بيتزامن تلقائياً مع صفحة العملاء</div>
    <div class="pkg-type-tabs" id="pkgTypeTabs"></div>
    <div id="pkgEditorList"></div>
    <button class="btn-add-pkg" onclick="addNewPackage()">＋ إضافة باقة جديدة</button>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="detailModal" onclick="bgClose(event)">
  <div class="modal-sheet">
    <div class="mhandle"></div>
    <div id="detailBody"></div>
  </div>
</div>

<div class="loading" id="loading"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyC4kXbfYZfZNglj_sHUTo7jKkHVQqBEHJI",
  authDomain: "isp-bookings.firebaseapp.com",
  projectId: "isp-bookings",
  storageBucket: "isp-bookings.firebasestorage.app",
  messagingSenderId: "352609960285",
  appId: "1:352609960285:web:dbcc35e65020c4fa1e28b4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const ADMIN_PASS = "isp2024";
let bookings = [], currentId = null;

function fmt(n){return Number(n).toLocaleString('ar-EG');}
function fmtDate(d){return d?new Date(d+'T00:00:00').toLocaleDateString('en-GB',{year:'numeric',month:'2-digit',day:'2-digit'}):'—';}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function loading(s){document.getElementById('loading').classList.toggle('show',s);}

function statusInfo(s){
  if(s==='confirmed')return{label:'مؤكد',cls:'b-confirmed',acc:'confirmed'};
  if(s==='done')return{label:'منتهي',cls:'b-done',acc:'done'};
  return{label:'معلق',cls:'b-pending',acc:'pending'};
}
function daysUntil(d){
  if(!d)return null;
  const t=new Date();t.setHours(0,0,0,0);
  const dd=new Date(d+'T00:00:00');dd.setHours(0,0,0,0);
  return Math.round((dd-t)/86400000);
}
function isExpired(b){
  if(b.status==='done')return false;
  const days=daysUntil(b.date);
  return days!==null && days<0;
}

window.checkLogin=function(){
  const p=document.getElementById('pwInput').value;
  if(p===ADMIN_PASS){
    document.getElementById('loginScreen').classList.add('hide');
    loadBookings();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pwInput').value='';
  }
};
window.logout=function(){
  document.getElementById('loginScreen').classList.remove('hide');
  document.getElementById('pwInput').value='';
};

async function loadBookings(){
  loading(true);
  try{
    const snap=await db.collection('bookings').orderBy('date','asc').get();
    bookings=snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){
    try{
      const snap=await db.collection('bookings').get();
      bookings=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{
        if(!a.date)return 1;if(!b.date)return -1;
        return new Date(a.date)-new Date(b.date);
      });
    }catch(e2){showToast('⚠️ خطأ في تحميل البيانات');}
  }
  renderStats();
  renderList();
  renderArchive();
  loading(false);
}

function renderStats(){
  // Only active (non-expired, non-done) bookings count in stats
  const active=bookings.filter(b=>!isExpired(b)&&b.status!=='done');
  const totalDeposit=active.reduce((s,b)=>s+Number(b.deposit||0),0);
  const totalRem=active.reduce((s,b)=>s+Number(b.remaining||0),0);
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat"><div class="stat-label">حجوزات قادمة</div><div class="stat-val">${active.length}</div></div>
    <div class="stat"><div class="stat-label">في الأرشيف</div><div class="stat-val" style="color:var(--blue)">${bookings.filter(b=>isExpired(b)||b.status==='done').length}</div></div>
    <div class="stat dark"><div class="stat-label">إجمالي العربون</div><div class="stat-val gold">${fmt(totalDeposit)} ج</div></div>
    <div class="stat"><div class="stat-label">مبالغ باقية</div><div class="stat-val a">${fmt(totalRem)} ج</div></div>
  `;
}

function bookingCard(b, archived=false){
  const si=statusInfo(b.status);
  const pct=b.price>0?Math.round((b.deposit/b.price)*100):0;
  const days=daysUntil(b.date);
  const todayTag=(days===0&&!archived)?'<span class="today-tag">🔴 اليوم</span>':(days===1&&!archived)?'<span class="today-tag" style="background:#e8f1fb;color:#1a5fa5;border-color:#90caf9">🔵 غداً</span>':'';
  const acc=archived?'archived':si.acc;
  const badge=archived?'<span class="sbadge b-archived">منتهي التاريخ</span>':`<span class="sbadge ${si.cls}">${si.label}</span>`;
  return `<div class="bcard${archived?' is-archived':''}" onclick="openDetail('${b.id}')">
    <div class="bacc ${acc}"></div>
    <div class="bbody">
      <div class="btop">
        <div>${todayTag}<div class="bnames">${b.groom||'—'}<span class="amp">&</span>${b.bride||'—'}</div></div>
        ${badge}
      </div>
      <div class="bmeta">
        <div class="bm">📅 ${fmtDate(b.date)}</div>
        <div class="bm">⏰ ${b.time||'—'}</div>
        <div class="bm">🎯 ${b.type||'—'}</div>
        <div class="bm">📦 ${b.package||'—'}</div>
        <div class="bm">📍 ${b.sessionLocation||'—'}</div>
        <div class="bm">📞 ${b.phone1||'—'}</div>
      </div>
      <div class="bpay">
        <div class="bpay-row">
          <span style="color:var(--text2)">نسبة السداد ${pct}%</span>
          <div style="display:flex;gap:10px">
            <span class="paid">+${fmt(b.deposit||0)} ج</span>
            <span class="rem">-${fmt(b.remaining||0)} ج</span>
          </div>
        </div>
        <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>
  </div>`;
}

window.filterList=function(){
  const q=document.getElementById('searchQ').value.toLowerCase();
  const active=bookings.filter(b=>!isExpired(b)&&b.status!=='done');
  const filtered=active.filter(b=>!q||(b.groom||'').toLowerCase().includes(q)||(b.bride||'').toLowerCase().includes(q));
  document.getElementById('listHdr').textContent=filtered.length+' حجز قادم';
  document.getElementById('bookingsList').innerHTML=filtered.length
    ? filtered.map(b=>bookingCard(b,false)).join('')
    : '<div class="empty"><div>📅</div><p>لا توجد حجوزات قادمة</p></div>';
};

function renderList(){filterList();}

function renderArchive(){
  const archived=bookings.filter(b=>isExpired(b)||b.status==='done')
    .sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById('archiveHdr').textContent=archived.length+' حجز في الأرشيف';
  document.getElementById('archiveList').innerHTML=archived.length
    ? archived.map(b=>bookingCard(b,true)).join('')
    : '<div class="empty"><div>🗂</div><p>الأرشيف فاضي</p></div>';
}

window.switchTab=function(tab){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  const map={bookings:'tabBtnBookings',archive:'tabBtnArchive',packages:'tabBtnPackages'};
  document.getElementById(map[tab]).classList.add('active');
  if(tab==='packages')loadPackagesEditor();
};

window.openDetail=function(id){
  const b=bookings.find(x=>x.id===id);
  if(!b)return;
  currentId=id;
  const si=statusInfo(b.status);
  const pct=b.price>0?Math.round((b.deposit/b.price)*100):0;
  const archived=isExpired(b)||b.status==='done';
  document.getElementById('detailBody').innerHTML=`
    <div class="dhero">
      <div class="dcouple">${b.groom||'—'}<span class="amp"> & </span>${b.bride||'—'}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="sbadge ${si.cls}">${si.label}</span>
        <span style="font-size:12px;color:rgba(255,255,255,0.4)">${fmtDate(b.date)}</span>
      </div>
    </div>
    <div class="mhead" style="border-bottom:none;padding-bottom:0">
      <span class="mhead-title">تفاصيل الحجز</span>
      <button class="mclose" onclick="closeDetail()">✕</button>
    </div>
    <div class="dsec">
      <div class="dsec-title">بيانات التواصل</div>
      <div class="dgrid">
        <div><div class="di-label">اسم العريس</div><div class="di-val">${b.groom||'—'}</div></div>
        <div><div class="di-label">اسم العروسة</div><div class="di-val">${b.bride||'—'}</div></div>
        <div><div class="di-label">رقم العريس</div><div class="di-val" style="direction:ltr;text-align:right">${b.phone1||'—'}</div></div>
        <div><div class="di-label">رقم العروسة</div><div class="di-val" style="direction:ltr;text-align:right">${b.phone2||'—'}</div></div>
      </div>
    </div>
    <div class="dsec">
      <div class="dsec-title">تفاصيل الجلسة</div>
      <div class="dgrid">
        <div><div class="di-label">نوع التصوير</div><div class="di-val">${b.type||'—'}</div></div>
        <div><div class="di-label">الباقة</div><div class="di-val">${b.package||'—'}</div></div>
        <div style="grid-column:1/-1"><div class="di-label">تفاصيل الباقة</div><div class="di-val" style="font-size:12px;line-height:1.7;white-space:pre-line">${b.packageDetails||'—'}</div></div>
        <div><div class="di-label">التاريخ</div><div class="di-val">${fmtDate(b.date)}</div></div>
        <div><div class="di-label">الوقت</div><div class="di-val">${b.time||'—'}</div></div>
        <div><div class="di-label">مكان السيشن</div><div class="di-val">${b.sessionLocation||'—'}</div></div>
        <div><div class="di-label">مكان القاعة</div><div class="di-val">${b.hallLocation||'—'}</div></div>
      </div>
    </div>
    <div class="dsec">
      <div class="dsec-title">المدفوعات</div>
      <div class="dgrid" style="margin-bottom:10px">
        <div><div class="di-label">سعر الباقة</div><div class="di-val">${fmt(b.price||0)} ج</div></div>
        <div><div class="di-label">طريقة الدفع</div><div class="di-val">${b.paymentMethod||'—'}</div></div>
        <div><div class="di-label">العربون المدفوع</div><div class="di-val g">${fmt(b.deposit||0)} ج</div></div>
        <div><div class="di-label">المبلغ الباقي</div><div class="di-val a" id="remDisplay">${fmt(b.remaining||0)} ج</div></div>
      </div>
      <div class="progress" style="margin-bottom:12px"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${!archived?`
      <div class="di-label">تعديل المبلغ الباقي</div>
      <div class="rem-editor">
        <input type="number" class="rem-input" id="remInput" value="${b.remaining||0}" placeholder="0">
        <button class="btn-save-rem" onclick="saveRemaining('${id}')">💾 حفظ</button>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px">لما يبقى صفر، الحجز ينتقل للأرشيف تلقائياً ✅</div>
      `:''}
    </div>
    ${!archived?`
    <div class="dsec">
      <div class="dsec-title">تغيير الحالة</div>
      <select class="status-select" id="statusSel" onchange="updateStatus('${id}',this.value)">
        <option value="pending" ${b.status==='pending'?'selected':''}>⏳ معلق</option>
        <option value="confirmed" ${b.status==='confirmed'?'selected':''}>✅ مؤكد</option>
        <option value="done" ${b.status==='done'?'selected':''}>🎉 منتهي</option>
      </select>
    </div>`:''}
    <div class="dactions">
      ${b.phone1?`<a class="btn-call" href="tel:${b.phone1}">📞 اتصل</a>`:''}
      ${b.phone1?`<a class="btn-call" href="https://wa.me/2${b.phone1}" target="_blank" style="background:#e8f5e9;color:#2d7a3a">💬 واتساب</a>`:''}
      <button class="btn-action" onclick="closeDetail()">✕ إغلاق</button>
      <button class="btn-del" onclick="deleteBooking('${id}')">🗑 حذف</button>
    </div>
  `;
  document.getElementById('detailModal').classList.add('open');
};

window.saveRemaining=async function(id){
  const val=parseFloat(document.getElementById('remInput').value)||0;
  loading(true);
  try{
    const updates={remaining:val};
    if(val<=0){
      updates.status='done';
      updates.completedAt=firebase.firestore.FieldValue.serverTimestamp();
    }
    await db.collection('bookings').doc(id).update(updates);
    const b=bookings.find(x=>x.id===id);
    if(b){b.remaining=val;if(val<=0)b.status='done';}
    renderStats();
    renderList();
    renderArchive();
    closeDetail();
    showToast(val<=0?'🎉 تم السداد الكامل — انتقل للأرشيف':'✅ تم تحديث المبلغ الباقي');
  }catch(e){showToast('⚠️ خطأ في الحفظ');}
  loading(false);
};

window.updateStatus=async function(id,status){
  loading(true);
  try{
    await db.collection('bookings').doc(id).update({status});
    const b=bookings.find(x=>x.id===id);
    if(b)b.status=status;
    renderStats();
    renderList();
    renderArchive();
    showToast('✅ تم تحديث الحالة');
  }catch(e){showToast('⚠️ خطأ في التحديث');}
  loading(false);
};

window.deleteBooking=async function(id){
  if(!confirm('هل تريد حذف هذا الحجز نهائياً؟'))return;
  loading(true);
  try{
    await db.collection('bookings').doc(id).delete();
    bookings=bookings.filter(b=>b.id!==id);
    closeDetail();
    renderStats();
    renderList();
    renderArchive();
    showToast('🗑 تم حذف الحجز');
  }catch(e){showToast('⚠️ خطأ في الحذف');}
  loading(false);
};

/* ===== PACKAGES ===== */
const TYPES=['زفاف','خطوبة','كتب كتاب','قاعة فقط'];
const DEFAULT_PACKAGES={
  'زفاف':[
    {name:'باقة 1',price:3500,details:'تصوير سيشن بعدد صور مفتوح'},
    {name:'باقة 2',price:4500,details:'تصوير السيشن + تصوير القاعة'},
    {name:'باقة 3',price:6000,details:'تصوير السيشن + تصوير القاعة\nألبوم 30×45 + تابلوه 40×60'},
    {name:'باقة 4',price:8000,details:'تصوير السيشن + تصوير القاعة\nألبوم 30×80 + تابلوه 50×70'},
  ],
  'خطوبة':[
    {name:'باقة 1',price:3000,details:'تصوير سيشن بعدد صور مفتوح'},
    {name:'باقة 2',price:4000,details:'تصوير السيشن + تصوير القاعة'},
    {name:'باقة 3',price:5500,details:'تصوير السيشن + تصوير القاعة\nألبوم 30×45 + تابلوه 40×60'},
  ],
  'كتب كتاب':[
    {name:'باقة 1',price:3000,details:'تصوير سيشن بعدد صور مفتوح'},
    {name:'باقة 2',price:4000,details:'تصوير السيشن + تصوير القاعة'},
    {name:'باقة 3',price:5500,details:'تصوير السيشن + تصوير القاعة\nألبوم 30×45 + تابلوه 40×60'},
  ],
  'قاعة فقط':[
    {name:'باقة 1',price:800,details:'تصوير قاعة لمدة ساعتين'},
    {name:'باقة 2',price:1000,details:'تصوير قاعة لمدة 3 ساعات'},
  ],
};
let activeType='زفاف', packagesData={}, packagesLoaded=false;

async function loadPackagesEditor(){
  if(!packagesLoaded){
    loading(true);
    try{
      const snap=await db.collection('packages').get();
      if(snap.empty){
        packagesData={...DEFAULT_PACKAGES};
        for(const type of TYPES){
          await db.collection('packages').doc(type).set({items:DEFAULT_PACKAGES[type]});
        }
        showToast('✅ تم إنشاء الباقات الافتراضية');
      }else{
        snap.forEach(d=>{packagesData[d.id]=d.data().items||[];});
        for(const type of TYPES){if(!packagesData[type])packagesData[type]=[];}
      }
      packagesLoaded=true;
    }catch(e){showToast('⚠️ خطأ في تحميل الباقات');packagesData={...DEFAULT_PACKAGES};}
    loading(false);
  }
  renderTypeTabs();
  renderPkgEditor();
}

function renderTypeTabs(){
  document.getElementById('pkgTypeTabs').innerHTML=TYPES.map(t=>
    `<button class="ptt-btn ${t===activeType?'active':''}" onclick="setActiveType('${t}')">${t}</button>`
  ).join('');
}

window.setActiveType=function(type){activeType=type;renderTypeTabs();renderPkgEditor();};

function renderPkgEditor(){
  const pkgs=packagesData[activeType]||[];
  document.getElementById('pkgEditorList').innerHTML=pkgs.map((p,i)=>`
    <div class="pkg-item" id="pki_${i}">
      <div class="pkg-item-head" onclick="togglePkgItem(${i})">
        <div class="pkg-item-name">📷 ${p.name||'باقة جديدة'}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="pkg-item-price">${fmt(p.price||0)} ج</div>
          <span style="color:var(--text3);font-size:18px">⌄</span>
        </div>
      </div>
      <div class="pkg-item-body" id="pkb_${i}">
        <div>
          <div class="pi-label">اسم الباقة</div>
          <input class="pi-input" id="pn_${i}" value="${p.name||''}">
        </div>
        <div>
          <div class="pi-label">السعر (جنيه)</div>
          <input class="pi-input" type="number" id="pp_${i}" value="${p.price||0}">
        </div>
        <div>
          <div class="pi-label">تفاصيل الباقة</div>
          <textarea class="pi-input pi-textarea" id="pd_${i}">${p.details||''}</textarea>
        </div>
        <div class="pkg-actions">
          <button class="btn-save-pkg" onclick="savePkg(${i})">💾 حفظ التعديلات</button>
          <button class="btn-del-pkg" onclick="deletePkg(${i})">🗑</button>
        </div>
      </div>
    </div>
  `).join('');
}

window.togglePkgItem=function(i){document.getElementById('pkb_'+i).classList.toggle('open');};

window.savePkg=async function(i){
  const name=document.getElementById('pn_'+i).value.trim();
  const price=parseFloat(document.getElementById('pp_'+i).value)||0;
  const details=document.getElementById('pd_'+i).value.trim();
  if(!name){showToast('⚠️ أدخل اسم الباقة');return;}
  packagesData[activeType][i]={name,price,details};
  loading(true);
  try{
    await db.collection('packages').doc(activeType).set({items:packagesData[activeType]});
    showToast('✅ تم حفظ الباقة');
    renderPkgEditor();
    renderTypeTabs();
    setTimeout(()=>{const b=document.getElementById('pkb_'+i);if(b)b.classList.add('open');},50);
  }catch(e){showToast('⚠️ خطأ في الحفظ');}
  loading(false);
};

window.deletePkg=async function(i){
  if(!confirm('هل تريد حذف هذه الباقة؟'))return;
  packagesData[activeType].splice(i,1);
  loading(true);
  try{
    await db.collection('packages').doc(activeType).set({items:packagesData[activeType]});
    showToast('🗑 تم حذف الباقة');
    renderPkgEditor();
  }catch(e){showToast('⚠️ خطأ في الحذف');}
  loading(false);
};

window.addNewPackage=function(){
  const pkgs=packagesData[activeType]||[];
  pkgs.push({name:'باقة جديدة',price:0,details:''});
  packagesData[activeType]=pkgs;
  renderPkgEditor();
  const idx=pkgs.length-1;
  setTimeout(()=>{
    const b=document.getElementById('pkb_'+idx);
    if(b){b.classList.add('open');b.scrollIntoView({behavior:'smooth',block:'center'});}
  },80);
};

window.closeDetail=function(){document.getElementById('detailModal').classList.remove('open');};
window.bgClose=function(e){if(e.target.id==='detailModal')closeDetail();};
</script>
